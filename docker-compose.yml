# docker-compose.yml — AETHARIA Multi-World Deployment
#
# Three worlds: Origin (8080), Caverns (8081), Skylands (8082)
# Shared SQLite database via volume
# Frontend connects to Origin by default, portals handle the rest

services:
  world-origin:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: world-origin
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - WORLD_CONFIG=/app/config/origin.json
      - PORTAL_SECRET=aetharia-portal-s3cret
      - DATABASE_PATH=/app/data/aetharia.db
      - AETHARIA_HEARTBEAT=30000
      - AETHARIA_DEBUG=false
      - CLIENT_PORTAL_URLS={"caverns":"ws://HOSTIP:8081","skylands":"ws://HOSTIP:8082"}
    volumes:
      - aetharia-data:/app/data
      - ./worlds:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const ws = new (require('ws'))('ws://localhost:8080'); ws.on('open', () => { ws.close(); process.exit(0); }); ws.on('error', () => process.exit(1)); setTimeout(() => process.exit(1), 3000);"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  world-caverns:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: world-caverns
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
      - WORLD_CONFIG=/app/config/caverns.json
      - PORTAL_SECRET=aetharia-portal-s3cret
      - DATABASE_PATH=/app/data/aetharia.db
      - AETHARIA_HEARTBEAT=30000
      - CLIENT_PORTAL_URLS={"origin":"ws://HOSTIP:8080","skylands":"ws://HOSTIP:8082"}
    volumes:
      - aetharia-data:/app/data
      - ./worlds:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const ws = new (require('ws'))('ws://localhost:8080'); ws.on('open', () => { ws.close(); process.exit(0); }); ws.on('error', () => process.exit(1)); setTimeout(() => process.exit(1), 3000);"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  world-skylands:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: world-skylands
    ports:
      - "8082:8080"
    environment:
      - PORT=8080
      - WORLD_CONFIG=/app/config/skylands.json
      - PORTAL_SECRET=aetharia-portal-s3cret
      - DATABASE_PATH=/app/data/aetharia.db
      - AETHARIA_HEARTBEAT=30000
      - CLIENT_PORTAL_URLS={"origin":"ws://HOSTIP:8080","caverns":"ws://HOSTIP:8081"}
    volumes:
      - aetharia-data:/app/data
      - ./worlds:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const ws = new (require('ws'))('ws://localhost:8080'); ws.on('open', () => { ws.close(); process.exit(0); }); ws.on('error', () => process.exit(1)); setTimeout(() => process.exit(1), 3000);"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Frontend/Dockerfile
    container_name: aetharia-frontend
    ports:
      - "3500:3500"
    depends_on:
      world-origin:
        condition: service_healthy
    restart: unless-stopped

  agents:
    build:
      context: .
      dockerfile: AI_Agents/Dockerfile
    container_name: aetharia-agents
    environment:
      - BACKEND_URL=ws://world-origin:8080
      - AGENT_TICK_RATE=500
    depends_on:
      world-origin:
        condition: service_healthy
    restart: unless-stopped

volumes:
  aetharia-data:
